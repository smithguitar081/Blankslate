<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLANKSLATE — Stream</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #fff; color: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }</style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero3D.jsx"></script>
  <script type="text/babel">
    const Footer = () => (
      <footer style={{ padding: '20px 40px', borderTop: '1px solid #ddd', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.9rem' }}>
        <div style={{ display: 'flex', gap: 24 }}>
          {[{ label: 'Newsletter', href: 'newsletter.html' }, { label: 'Generative AI Policy', href: 'ai-policy.html' }].map(({ label, href }) => (
            <a key={label} href={href} style={{ color: '#000', textDecoration: 'none', fontWeight: 400, borderBottom: '1px solid transparent', transition: 'border-color 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.borderBottomColor = '#000'}
              onMouseLeave={e => e.currentTarget.style.borderBottomColor = 'transparent'}
            >{label}</a>
          ))}
        </div>
        <span style={{ color: '#999', fontWeight: 400 }}>© 2026 BSR Inc. All Rights Reserved.</span>
      </footer>
    );

    const items = [
      { title: 'Track One', format: 'MP3', price: '$1.00' },
      { title: 'Track Two', format: 'MP3', price: '$1.00' },
      { title: 'Distress',  format: 'M4A', price: '$1.00' },
    ];

    const ShopItem = ({ title, format, price }) => {
      const [hovered, setHovered] = React.useState(false);
      return (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: '1px solid #eee', padding: '24px 0' }}>
          <div>
            <div style={{ fontSize: '1.1rem', color: '#000', fontWeight: 400, marginBottom: 4 }}>{title}</div>
            <div style={{ fontSize: '0.85rem', color: '#999', fontWeight: 400 }}>{format}</div>
          </div>
          <a href="#" onClick={e => e.preventDefault()}
            onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
            style={{ display: 'inline-block', padding: '10px 20px', color: hovered ? '#fff' : '#000', background: hovered ? '#000' : 'transparent', border: '1px solid #000', textDecoration: 'none', fontSize: '0.95rem', fontWeight: 400, transition: 'background 0.3s, color 0.3s' }}>
            Buy {format} – {price}
          </a>
        </div>
      );
    };

    const App = () => {
      const contentRef = React.useRef(null);
      React.useEffect(() => {
        let cancelled = false;
        let animId = null;
        const onInterrupt = () => { cancelled = true; if (animId) cancelAnimationFrame(animId); };
        window.addEventListener('wheel', onInterrupt, { once: true, passive: true });
        window.addEventListener('touchstart', onInterrupt, { once: true, passive: true });
        window.addEventListener('keydown', onInterrupt, { once: true });

        const timer = setTimeout(() => {
          if (cancelled || !contentRef.current) return;
          const target = contentRef.current.offsetTop;
          const start = window.scrollY;
          const distance = target - start;
          const duration = 1000;
          let startTime = null;
          const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
          const step = timestamp => {
            if (cancelled) return;
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);
            window.scrollTo(0, start + distance * ease(progress));
            if (progress < 1) animId = requestAnimationFrame(step);
          };
          animId = requestAnimationFrame(step);
        }, 800);

        return () => {
          cancelled = true;
          clearTimeout(timer);
          if (animId) cancelAnimationFrame(animId);
          window.removeEventListener('wheel', onInterrupt);
          window.removeEventListener('touchstart', onInterrupt);
          window.removeEventListener('keydown', onInterrupt);
        };
      }, []);

      return (
        <div>
          <Nav active="Stream" />
          <div style={{ paddingTop: 70 }}>
            <Hero3D title="Stream" axis="xz" zoom={1.8} />
            <section ref={contentRef} style={{ maxWidth: 680, margin: '0 auto', padding: '40px 40px 80px' }}>
              <h1 style={{ fontSize: '2.5rem', fontWeight: 400, color: '#000', marginBottom: 48, textAlign: 'center' }}>Stream</h1>
              <div style={{ textAlign: 'center', marginBottom: 48 }}>
                <a href="https://www.ninaprotocol.com/profiles/blankslaterecords?ref=BFgfJYDS17MvNmtwA6jFoP3U5Y4zF85YCiFYw33C7FGG"
                  target="_blank" rel="noopener noreferrer"
                  style={{ fontSize: '0.95rem', color: '#999', fontWeight: 400, textDecoration: 'none', borderBottom: '1px solid transparent', transition: 'border-color 0.2s' }}
                  onMouseEnter={e => e.currentTarget.style.borderBottomColor = '#999'}
                  onMouseLeave={e => e.currentTarget.style.borderBottomColor = 'transparent'}
                >Nina Protocol</a>
              </div>
              {items.map(i => <ShopItem key={i.title} {...i} />)}
            </section>
            <Footer />
          </div>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
