<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLANKSLATE — Contact</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; color: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    input, textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid #ddd; color: #000; font-family: inherit; font-size: 1rem; font-weight: 400; padding: 12px 0; outline: none; transition: border-color 0.3s; }
    input:focus, textarea:focus { border-bottom-color: #000; }
    textarea { resize: none; height: 100px; }
    ::placeholder { color: #bbb; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero3D.jsx"></script>
  <script type="text/babel">
    const FORMSPREE_ID = 'YOUR_FORM_ID';

    const Footer = () => (
      <footer style={{ padding: '20px 40px', borderTop: '1px solid #ddd', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.9rem' }}>
        <div style={{ display: 'flex', gap: 24 }}>
          {[{ label: 'Newsletter', href: 'newsletter.html' }, { label: 'Generative AI Policy', href: 'ai-policy.html' }].map(({ label, href }) => (
            <a key={label} href={href} style={{ color: '#000', textDecoration: 'none', fontWeight: 400, borderBottom: '1px solid transparent', transition: 'border-color 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.borderBottomColor = '#000'}
              onMouseLeave={e => e.currentTarget.style.borderBottomColor = 'transparent'}
            >{label}</a>
          ))}
        </div>
        <span style={{ color: '#999', fontWeight: 400 }}>© 2026 BSR Inc. All Rights Reserved.</span>
      </footer>
    );

    const ContactForm = () => {
      const [status, setStatus] = React.useState('idle');
      const [hovered, setHovered] = React.useState(false);
      const [name, setName] = React.useState('');
      const [email, setEmail] = React.useState('');
      const [message, setMessage] = React.useState('');

      const handleSubmit = async e => {
        e.preventDefault();
        setStatus('sending');
        try {
          const res = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify({ name, email, message }),
          });
          setStatus(res.ok ? 'sent' : 'error');
        } catch { setStatus('error'); }
      };

      if (status === 'sent') return (
        <div style={{ textAlign: 'center', padding: '60px 0' }}>
          <p style={{ fontSize: '1.2rem', color: '#333', fontWeight: 400 }}>Message received.</p>
        </div>
      );

      return (
        <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 32 }}>
          <input type="text" placeholder="Name" value={name} onChange={e => setName(e.target.value)} required />
          <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)} required />
          <textarea placeholder="Message" value={message} onChange={e => setMessage(e.target.value)} required />
          {status === 'error' && <p style={{ fontSize: '0.9rem', color: '#c00', fontWeight: 400 }}>Something went wrong. Please email blankslaterecords@proton.me directly.</p>}
          <div>
            <button type="submit" disabled={status === 'sending'}
              onMouseEnter={() => setHovered(true)} onMouseLeave={() => setHovered(false)}
              style={{ background: hovered && status !== 'sending' ? '#000' : 'transparent', color: hovered && status !== 'sending' ? '#fff' : '#000', border: '1px solid #000', padding: '10px 28px', fontSize: '1rem', fontWeight: 400, fontFamily: 'inherit', cursor: status === 'sending' ? 'default' : 'pointer', opacity: status === 'sending' ? 0.5 : 1, transition: 'background 0.3s, color 0.3s' }}>
              {status === 'sending' ? 'Sending…' : 'Send'}
            </button>
          </div>
        </form>
      );
    };

    const App = () => {
      const contentRef = React.useRef(null);
      React.useEffect(() => {
        let cancelled = false;
        let animId = null;
        const onInterrupt = () => { cancelled = true; if (animId) cancelAnimationFrame(animId); };
        window.addEventListener('wheel', onInterrupt, { once: true, passive: true });
        window.addEventListener('touchstart', onInterrupt, { once: true, passive: true });
        window.addEventListener('keydown', onInterrupt, { once: true });

        const timer = setTimeout(() => {
          if (cancelled || !contentRef.current) return;
          const target = contentRef.current.offsetTop;
          const start = window.scrollY;
          const distance = target - start;
          const duration = 1000;
          let startTime = null;
          const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
          const step = timestamp => {
            if (cancelled) return;
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);
            window.scrollTo(0, start + distance * ease(progress));
            if (progress < 1) animId = requestAnimationFrame(step);
          };
          animId = requestAnimationFrame(step);
        }, 800);

        return () => {
          cancelled = true;
          clearTimeout(timer);
          if (animId) cancelAnimationFrame(animId);
          window.removeEventListener('wheel', onInterrupt);
          window.removeEventListener('touchstart', onInterrupt);
          window.removeEventListener('keydown', onInterrupt);
        };
      }, []);

      return (
        <div>
          <Nav active="Contact" />
          <div style={{ paddingTop: 70 }}>
            <Hero3D title="Contact" axis="dvd" zoom={1.8} />
            <section ref={contentRef} style={{ maxWidth: 580, margin: '0 auto', padding: '80px 40px' }}>
              <h1 style={{ fontSize: '2.5rem', fontWeight: 400, color: '#000', marginBottom: 48, textAlign: 'center' }}>Contact</h1>
              <ContactForm />
            </section>
            <Footer />
          </div>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
