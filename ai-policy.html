<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLANKSLATE — Generative AI Policy</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { background: #fff; color: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel">
    const Footer = () => (
      <footer style={{ padding: '20px 40px', borderTop: '1px solid #ddd', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.9rem' }}>
        <div style={{ display: 'flex', gap: 24 }}>
          {[{ label: 'Newsletter', href: 'newsletter.html' }, { label: 'Generative AI Policy', href: 'ai-policy.html' }].map(({ label, href }) => (
            <a key={label} href={href} style={{ color: '#000', textDecoration: 'none', fontWeight: 400, borderBottom: '1px solid transparent', transition: 'border-color 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.borderBottomColor = '#000'}
              onMouseLeave={e => e.currentTarget.style.borderBottomColor = 'transparent'}
            >{label}</a>
          ))}
        </div>
        <span style={{ color: '#999', fontWeight: 400 }}>© 2026 BSR Inc. All Rights Reserved.</span>
      </footer>
    );

    const paragraphs = [
      `We strictly prohibit the use of any content owned and/or controlled by Blankslate (including Blank Slate Records, and other associated companies) ("BSR Content"), now and in the future —including but not limited to recordings, audio visual recordings, artwork, names, likenesses, imagery, lyrics, compositions, and associated metadata—for the training or development of generative AI models. This includes machine learning algorithms, large language models, and other AI systems used to generate or synthesise music, audio, text, or images.`,
      `BSR Content may not be used for any form of text and data mining, AI training, web scraping, data extraction, alteration, or the creation of derivative works. All materials distributed by our label are protected by copyright law and are not licensed—explicitly or implicitly—for inclusion in datasets used to train or fine-tune AI technologies.`,
      `We expressly reserve all rights related to the use of BSR Content throughout the World, including without limitation those granted under Article 4 of the EU Directive 2019/790/EC, to the fullest extent permitted by law.`,
      `We stand firmly for the integrity of human creativity and the right of artists to control how their work is used. We actively monitor the misuse of our intellectual property and will take appropriate legal action against unauthorised AI training, data scraping, or ingestion of our materials.`,
      `If you want to use BSR Content for any AI purpose, you must contact us in advance to request a license by emailing blankslaterecords@proton.me. Any such license may be withheld or denied in our sole discretion.`,
    ];

    const App = () => {
      const contentRef = React.useRef(null);
      React.useEffect(() => {
        let cancelled = false;
        let animId = null;
        const onInterrupt = () => { cancelled = true; if (animId) cancelAnimationFrame(animId); };
        window.addEventListener('wheel', onInterrupt, { once: true, passive: true });
        window.addEventListener('touchstart', onInterrupt, { once: true, passive: true });
        window.addEventListener('keydown', onInterrupt, { once: true });

        const timer = setTimeout(() => {
          if (cancelled || !contentRef.current) return;
          const target = contentRef.current.offsetTop;
          const start = window.scrollY;
          const distance = target - start;
          const duration = 1000;
          let startTime = null;
          const ease = t => t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
          const step = timestamp => {
            if (cancelled) return;
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;
            const progress = Math.min(elapsed / duration, 1);
            window.scrollTo(0, start + distance * ease(progress));
            if (progress < 1) animId = requestAnimationFrame(step);
          };
          animId = requestAnimationFrame(step);
        }, 800);

        return () => {
          cancelled = true;
          clearTimeout(timer);
          if (animId) cancelAnimationFrame(animId);
          window.removeEventListener('wheel', onInterrupt);
          window.removeEventListener('touchstart', onInterrupt);
          window.removeEventListener('keydown', onInterrupt);
        };
      }, []);

      return (
        <div>
          <Nav />
          <div style={{ paddingTop: 70 }}>
            <section style={{
              backgroundImage: "url('assets/glass-head-inverted.jpg')",
              backgroundSize: 'cover', backgroundPosition: 'center',
              backgroundAttachment: 'fixed', height: '100vh',
              position: 'relative', display: 'flex', justifyContent: 'center', alignItems: 'center',
            }}>
              <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.45)' }} />
              <h1 style={{ position: 'relative', zIndex: 1, fontSize: 'clamp(2rem, 6vw, 5rem)', fontWeight: 400, color: '#fff', letterSpacing: '-1px', textAlign: 'center', margin: 0, lineHeight: 1 }}>Generative AI Policy</h1>
            </section>
            <section ref={contentRef} style={{ maxWidth: 680, margin: '0 auto', padding: '80px 40px' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 32 }}>
                {paragraphs.map((p, i) => (
                  <p key={i} style={{ fontSize: '1rem', color: '#333', lineHeight: 1.9, fontWeight: 400 }}>{p}</p>
                ))}
              </div>
            </section>
            <Footer />
          </div>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
