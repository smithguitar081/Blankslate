<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globe — BLANKSLATE</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    #root { width: 100vw; height: 100vh; }
    #globe-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }
    .globe-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .pin-label {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .pin-branches {
      position: relative;
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 44px;
      margin-bottom: 30px;
    }
    .pin-v-lines {
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      width: 100%;
      height: 30px;
      overflow: visible;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease 0.15s;
    }
    .pin-branches.open + .pin-v-lines,
    .pin-branches.open .pin-v-lines { opacity: 1; }
    .pin-branch {
      pointer-events: auto;
      position: relative;
      display: block;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
      transform: translateY(14px) scale(0.85);
      opacity: 0;
      transition: transform 0.35s cubic-bezier(.2,.7,.2,1), opacity 0.25s ease, background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
    }
    .pin-branches.open .pin-branch {
      transform: translateY(0) scale(1);
      opacity: 1;
    }
    .pin-branches.open .pin-branch:nth-child(1) { transition-delay: 0.05s; }
    .pin-branches.open .pin-branch:nth-child(2) { transition-delay: 0.10s; }
    .pin-branches.open .pin-branch:nth-child(3) { transition-delay: 0.15s; }
    .pin-branch:hover {
      background: #fff;
      color: #000;
      border-color: #fff;
    }
    .pin-label-bubble {
      pointer-events: auto;
      cursor: pointer;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 8px 14px;
      white-space: nowrap;
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1.5;
      text-align: center;
      text-decoration: none;
      display: block;
      transform-origin: center bottom;
      transition: transform 0.35s cubic-bezier(.2,.7,.2,1), opacity 0.3s ease, background 0.18s ease, border-color 0.18s ease;
    }
    .pin-label-bubble:hover {
      background: rgba(0,0,0,0.95);
      border-color: rgba(255,255,255,0.55);
    }
    .pin-label-bubble.active {
      transform: scale(0.68);
      opacity: 0.4;
      background: rgba(0,0,0,0.55);
      border-color: rgba(255,255,255,0.12);
    }
    .pin-label-bubble strong {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .pin-label-bubble .pin-hint {
      display: block;
      font-size: 0.62rem;
      opacity: 0.55;
      margin-top: 2px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .pin-label-stem {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.5);
    }
    .pin-label-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px 3px rgba(255,255,255,0.45);
    }
    .globe-header {
      position: absolute;
      top: 70px;
      left: 0;
      right: 0;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      text-align: center;
      pointer-events: none;
      z-index: 10;
      padding: 18px 24px 14px;
    }
    .globe-header h1 {
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #fff;
    }
    .globe-header p {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.4);
      margin-top: 5px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .drag-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel">

    const ARTISTS = [
      { location: 'Bristol, England', lat: 51.4545, lon: -2.5879,  artists: [
        { name: 'John Smith',  href: 'john-smith.html' },
      ]},
      { location: 'Vietnam',          lat: 16.0,    lon: 108.0,    artists: [
        { name: 'Truong',      href: 'truong.html' },
      ]},
      { location: 'New York City',    lat: 40.7128, lon: -74.006,  artists: [
        { name: 'Blue Sunday', href: 'blue-sunday.html' },
        { name: 'The Uncuts',  href: 'the-uncuts.html' },
      ]},
    ];

    function latLonToVec3(lat, lon, r) {
      const phi   = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
         r * Math.cos(phi),
         r * Math.sin(phi) * Math.sin(theta)
      );
    }

    const GlobeScene = () => {
      const canvasRef  = React.useRef(null);
      const wrapperRef = React.useRef(null);
      const [pins, setPins]       = React.useState([]);
      const [dragging, setDragging] = React.useState(false);
      const [openIdx, setOpenIdx] = React.useState(null);

      // Close branches when user clicks empty space
      React.useEffect(() => {
        const onDocClick = (e) => {
          if (!e.target.closest('.pin-label')) setOpenIdx(null);
        };
        window.addEventListener('mousedown', onDocClick);
        return () => window.removeEventListener('mousedown', onDocClick);
      }, []);

      React.useEffect(() => {
        const canvas  = canvasRef.current;
        const wrapper = wrapperRef.current;
        const W = window.innerWidth;
        const H = window.innerHeight;

        // ── Renderer ──────────────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(W, H);
        renderer.outputEncoding = THREE.sRGBEncoding;
        const scene  = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        const camera = new THREE.PerspectiveCamera(42, W / H, 0.1, 100);
        camera.position.set(0, 0, 4.2);
        // Shift the world content down so the globe sits lower in the viewport,
        // leaving the top banner area uncovered.
        const VIEW_OFFSET_Y = -0.35;

        // ── Lights ────────────────────────────────────────────────────────
        scene.add(new THREE.AmbientLight(0x334466, 0.7));
        const sun = new THREE.DirectionalLight(0xfff5e0, 1.1);
        sun.position.set(5, 3, 5);
        scene.add(sun);
        const fill = new THREE.DirectionalLight(0x4488cc, 0.45);
        fill.position.set(-4, -2, -3);
        scene.add(fill);

        // ── Stars ─────────────────────────────────────────────────────────
        // Two layers: bigger/brighter foreground stars + smaller distant ones
        const makeStarLayer = (count, rMin, rMax, size, opacity) => {
          const verts = [];
          for (let i = 0; i < count; i++) {
            const r = rMin + Math.random() * (rMax - rMin);
            const t = Math.random() * Math.PI * 2;
            const p = Math.acos(2 * Math.random() - 1);
            verts.push(r*Math.sin(p)*Math.cos(t), r*Math.cos(p), r*Math.sin(p)*Math.sin(t));
          }
          const geo = new THREE.BufferGeometry();
          geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
          const mat = new THREE.PointsMaterial({
            color: 0xffffff,
            size,
            sizeAttenuation: false,
            transparent: true,
            opacity,
            depthWrite: false,
          });
          return new THREE.Points(geo, mat);
        };
        // Group stars so they rotate with the globe
        const starGroup = new THREE.Group();
        starGroup.add(makeStarLayer(2500, 30, 60, 1.6, 0.95)); // bright stars
        starGroup.add(makeStarLayer(4000, 30, 60, 0.9, 0.55)); // dim background stars
        scene.add(starGroup);

        // ── Atmosphere ────────────────────────────────────────────────────
        const atmMesh = new THREE.Mesh(
          new THREE.SphereGeometry(1.09, 64, 64),
          new THREE.MeshPhongMaterial({ color: 0x2255bb, emissive: 0x112244, transparent: true, opacity: 0.28, side: THREE.BackSide })
        );
        atmMesh.position.y = VIEW_OFFSET_Y;
        scene.add(atmMesh);

        // ── Globe ─────────────────────────────────────────────────────────
        const RADIUS = 1.0;
        const globeMat = new THREE.MeshPhongMaterial({
          color: 0x1a4f7a,
          specular: new THREE.Color(0x2255aa),
          shininess: 40,
        });

        // Inject ocean-mask shader: replace ocean pixels with a flat color,
        // keep land pixels from the diffuse map.
        const OCEAN_COLOR = new THREE.Color(0x0d2a44);
        globeMat.onBeforeCompile = (shader) => {
          shader.uniforms.waterMask  = { value: null };
          shader.uniforms.oceanColor = { value: OCEAN_COLOR };
          globeMat.userData.shader   = shader;
          shader.fragmentShader =
            'uniform sampler2D waterMask;\nuniform vec3 oceanColor;\n' +
            shader.fragmentShader.replace(
              '#include <map_fragment>',
              `
                #ifdef USE_MAP
                  vec4 texelColor = texture2D( map, vUv );
                  texelColor = mapTexelToLinear( texelColor );
                  float water = texture2D( waterMask, vUv ).r;
                  water = smoothstep(0.35, 0.65, water);
                  texelColor.rgb = mix( texelColor.rgb, oceanColor, water );
                  diffuseColor *= texelColor;
                #endif
              `
            );
        };

        const globe = new THREE.Mesh(new THREE.SphereGeometry(RADIUS, 96, 96), globeMat);
        globe.position.y = VIEW_OFFSET_Y;
        scene.add(globe);

        // ── Textures ──────────────────────────────────────────────────────
        const tl = new THREE.TextureLoader();
        tl.crossOrigin = 'anonymous';

        // Day texture
        tl.load(
          'https://raw.githubusercontent.com/turban/webgl-earth/master/images/2_no_clouds_4k.jpg',
          tex => { globeMat.map = tex; globeMat.color.set(0xffffff); globeMat.needsUpdate = true; },
          undefined,
          () => tl.load(
            'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg',
            tex => { globeMat.map = tex; globeMat.color.set(0xffffff); globeMat.needsUpdate = true; }
          )
        );

        // Water mask (specular map: white = water, black = land)
        tl.load(
          'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_specular_2048.jpg',
          tex => {
            if (globeMat.userData.shader) {
              globeMat.userData.shader.uniforms.waterMask.value = tex;
            }
            globeMat.needsUpdate = true;
          }
        );

        // Bump map (terrain) — only affects land now that ocean is flat
        tl.load(
          'https://raw.githubusercontent.com/turban/webgl-earth/master/images/elev_bump_4k.jpg',
          tex => { globeMat.bumpMap = tex; globeMat.bumpScale = 0.06; globeMat.needsUpdate = true; }
        );

        // ── Clouds ────────────────────────────────────────────────────────
        const cloudMat = new THREE.MeshPhongMaterial({
          transparent: true,
          opacity: 0.42,
          depthWrite: false,
        });
        const clouds = new THREE.Mesh(
          new THREE.SphereGeometry(RADIUS + 0.015, 64, 64),
          cloudMat
        );
        clouds.position.y = VIEW_OFFSET_Y;
        // Clouds are independent — NOT child of globe, so they drift separately
        scene.add(clouds);

        tl.load(
          'https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png',
          tex => { cloudMat.map = tex; cloudMat.alphaMap = tex; cloudMat.needsUpdate = true; },
          undefined,
          () => tl.load(
            'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_clouds_1024.png',
            tex => { cloudMat.map = tex; cloudMat.alphaMap = tex; cloudMat.needsUpdate = true; }
          )
        );

        // ── Pins ──────────────────────────────────────────────────────────
        const PIN_R = 0.028;
        const pinMeshes = ARTISTS.map(artist => {
          const pos  = latLonToVec3(artist.lat, artist.lon, RADIUS + PIN_R * 0.6);
          const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(PIN_R, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1.2, roughness: 0.1 })
          );
          mesh.position.copy(pos);
          globe.add(mesh);
          return { mesh, artist };
        });

        // ── Interaction ───────────────────────────────────────────────────
        let autoSpin = true, isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let velX = 0, velY = 0, rotX = 0, rotY = 0;
        let camZ = 4.2;
        const CAM_MIN = 1.3, CAM_MAX = 6.0;

        const onMouseDown = e => { isDragging = true; autoSpin = false; prevMouse = { x: e.clientX, y: e.clientY }; velX = velY = 0; setDragging(true); };
        const onMouseMove = e => {
          if (!isDragging) return;
          velX = (e.clientY - prevMouse.y) * 0.005;
          velY = (e.clientX - prevMouse.x) * 0.005;
          rotX += velX; rotY += velY;
          prevMouse = { x: e.clientX, y: e.clientY };
        };
        const onMouseUp = () => { isDragging = false; setDragging(false); };
        const onWheel = e => { e.preventDefault(); camZ = Math.min(CAM_MAX, Math.max(CAM_MIN, camZ + e.deltaY * 0.004)); };

        let prevPinchDist = null;
        const onTouchStart = e => {
          if (e.touches.length === 2) { const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY; prevPinchDist = Math.sqrt(dx*dx+dy*dy); return; }
          isDragging = true; autoSpin = false; prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; velX = velY = 0;
        };
        const onTouchMove = e => {
          if (e.touches.length === 2 && prevPinchDist !== null) { const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY, d = Math.sqrt(dx*dx+dy*dy); camZ = Math.min(CAM_MAX, Math.max(CAM_MIN, camZ-(d-prevPinchDist)*0.01)); prevPinchDist = d; return; }
          if (!isDragging) return;
          velX = (e.touches[0].clientY - prevMouse.y) * 0.005; velY = (e.touches[0].clientX - prevMouse.x) * 0.005;
          rotX += velX; rotY += velY; prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        };
        const onTouchEnd = () => { isDragging = false; prevPinchDist = null; };

        wrapper.addEventListener('mousedown',  onMouseDown);
        window .addEventListener('mousemove',  onMouseMove);
        window .addEventListener('mouseup',    onMouseUp);
        wrapper.addEventListener('wheel',      onWheel, { passive: false });
        wrapper.addEventListener('touchstart', onTouchStart, { passive: true });
        window .addEventListener('touchmove',  onTouchMove,  { passive: true });
        window .addEventListener('touchend',   onTouchEnd);

        // ── Animate ───────────────────────────────────────────────────────
        let animId;
        const animate = () => {
          animId = requestAnimationFrame(animate);
          camera.position.z += (camZ - camera.position.z) * 0.1;

          if (autoSpin) {
            globe.rotation.y     += 0.0018;
            clouds.rotation.y    += 0.002; // clouds drift slightly faster
            // stars drift slowly (much slower than globe for parallax depth)
            starGroup.rotation.y += 0.0004;
          } else {
            if (!isDragging) { velX *= 0.92; velY *= 0.92; rotX += velX; rotY += velY; }
            globe.rotation.x = rotX;
            globe.rotation.y = rotY;
            clouds.rotation.x = rotX;
            clouds.rotation.y = rotY + 0.002; // maintain slight cloud offset
            // stars rotate with drag, but at a slower rate for parallax depth
            starGroup.rotation.x = rotX * 0.35;
            starGroup.rotation.y = rotY * 0.35;
          }

          // Project pins
          const w = wrapper.clientWidth, h = wrapper.clientHeight;
          setPins(pinMeshes.map(({ mesh, artist }) => {
            const wp = new THREE.Vector3();
            mesh.getWorldPosition(wp);
            const dot = wp.clone().normalize().dot(wp.clone().sub(camera.position).normalize());
            const proj = wp.clone().project(camera);
            return { x: (proj.x*0.5+0.5)*w, y: (-proj.y*0.5+0.5)*h, visible: dot < -0.08, artist };
          }));

          renderer.render(scene, camera);
        };
        animate();

        // ── Resize ────────────────────────────────────────────────────────
        const onResize = () => { const w = window.innerWidth, h = window.innerHeight; renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix(); };
        window.addEventListener('resize', onResize);

        return () => {
          cancelAnimationFrame(animId);
          window.removeEventListener('resize',     onResize);
          wrapper.removeEventListener('mousedown', onMouseDown);
          window .removeEventListener('mousemove', onMouseMove);
          window .removeEventListener('mouseup',   onMouseUp);
          wrapper.removeEventListener('wheel',     onWheel);
          wrapper.removeEventListener('touchstart',onTouchStart);
          window .removeEventListener('touchmove', onTouchMove);
          window .removeEventListener('touchend',  onTouchEnd);
          renderer.dispose();
        };
      }, []);

      return (
        <div ref={wrapperRef} className="globe-wrapper" style={{ cursor: dragging ? 'grabbing' : 'grab' }}>
          <canvas ref={canvasRef} id="globe-canvas" />

          {pins.map((pin, i) => {
            const list = pin.artist.artists;
            const isMulti = list.length > 1;
            const isOpen = openIdx === i;
            const handleBubbleClick = (e) => {
              if (isMulti) { e.preventDefault(); setOpenIdx(isOpen ? null : i); }
            };
            return (
              <div key={i} className="pin-label" style={{ left: pin.x, top: pin.y, zIndex: pin.visible ? (isOpen ? 20 : 5) : 0, opacity: pin.visible ? 1 : 0, transition: 'opacity 0.3s ease' }}>
                {isMulti && (
                  <div className={`pin-branches ${isOpen ? 'open' : ''}`}>
                    {list.map((a) => (
                      <a key={a.name} className="pin-branch" href={a.href}>{a.name}</a>
                    ))}
                    {isOpen && (
                      <svg className="pin-v-lines" preserveAspectRatio="none" viewBox="0 0 100 30">
                        <line x1="18" y1="0" x2="50" y2="30" stroke="rgba(255,255,255,0.55)" strokeWidth="0.8" />
                        <line x1="82" y1="0" x2="50" y2="30" stroke="rgba(255,255,255,0.55)" strokeWidth="0.8" />
                      </svg>
                    )}
                  </div>
                )}
                <a
                  href={isMulti ? '#' : list[0].href}
                  className={`pin-label-bubble ${isOpen ? 'active' : ''}`}
                  onClick={handleBubbleClick}
                >
                  {isMulti ? (
                    <>
                      <strong>{list.map(a => a.name).join(' & ')}</strong>
                      {pin.artist.location}
                    </>
                  ) : (
                    <>
                      <strong>{list[0].name}</strong>
                      {pin.artist.location}
                    </>
                  )}
                </a>
                <div className="pin-label-stem"></div>
                <div className="pin-label-dot"></div>
              </div>
            );
          })}

          <div className="globe-header">
            <h1>Our Artists</h1>
            <p>Around the world</p>
          </div>

          <p className="drag-hint">Scroll to zoom &nbsp;·&nbsp; Drag to rotate</p>
        </div>
      );
    };

    const App = () => (
      <div>
        <Nav active="Globe" />
        <GlobeScene />
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
