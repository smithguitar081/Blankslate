<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLANKSLATE — Truong</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; color: #000; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .photo-hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    .photo-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      /* Edge blur via mask */
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }
    .photo-hero-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-start;
      padding: 60px 60px;
      background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 55%);
      pointer-events: none;
    }
    .photo-hero-overlay h1 {
      font-size: clamp(4rem, 10vw, 9rem);
      font-weight: 400;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .photo-hero-overlay p {
      font-size: 1rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel">
    const Footer = () => (
      <footer style={{ padding: '20px 40px', borderTop: '1px solid #ddd', display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.9rem' }}>
        <div style={{ display: 'flex', gap: 24 }}>
          {[{ label: 'Newsletter', href: 'newsletter.html' }, { label: 'Generative AI Policy', href: 'ai-policy.html' }].map(({ label, href }) => (
            <a key={label} href={href} style={{ color: '#000', textDecoration: 'none', fontWeight: 400, borderBottom: '1px solid transparent', transition: 'border-color 0.2s' }}
              onMouseEnter={e => e.currentTarget.style.borderBottomColor = '#000'}
              onMouseLeave={e => e.currentTarget.style.borderBottomColor = 'transparent'}
            >{label}</a>
          ))}
        </div>
        <span style={{ color: '#999', fontWeight: 400 }}>© 2026 BSR Inc. All Rights Reserved.</span>
      </footer>
    );

    const App = () => (
      <div>
        <Nav active="Artists" />
        <div style={{ paddingTop: 70 }}>
          {/* Photo hero with edge blur */}
          <div className="photo-hero">
            <img src="assets/truong-hero.jpg" alt="Truong" />
            <div className="photo-hero-overlay">
              <h1>Truong</h1>
              <p>Artist · Vietnam</p>
            </div>
          </div>

          {/* Bio section */}
          <section style={{ maxWidth: 680, margin: '0 auto', padding: '80px 40px' }}>
            <h2 style={{ fontSize: '1.5rem', fontWeight: 400, marginBottom: 24, letterSpacing: '0.05em' }}>About</h2>
            <p style={{ fontSize: '1.1rem', color: '#333', lineHeight: 1.85, fontWeight: 400 }}>
              Truong is a BLANKSLATE artist based in Vietnam. His sound is a collision of worlds — raw energy, late nights, and a restless search for something real.
            </p>
            <div style={{ marginTop: 48, display: 'flex', gap: 16 }}>
              <a href="artists.html" style={{ display: 'inline-block', color: '#000', border: '1px solid #000', padding: '10px 24px', textDecoration: 'none', fontSize: '0.9rem', letterSpacing: '0.08em', transition: 'background 0.2s, color 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.background = '#000'; e.currentTarget.style.color = '#fff'; }}
                onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = '#000'; }}
              >← All Artists</a>
            </div>
          </section>

          <Footer />
        </div>
      </div>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
